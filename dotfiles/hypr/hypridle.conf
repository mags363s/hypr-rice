general {
    # Paso 4: Llamamos directamente a hyprlock para mayor fiabilidad
    lock_cmd = pidof hyprlock || hyprlock      
    
    # Bloquea la pantalla automáticamente antes de que el sistema se suspenda
    before_sleep_cmd = hyprlock     
    
    # Enciende el monitor inmediatamente al despertar
    after_sleep_cmd = hyprctl dispatch dpms on  
}

# 1. AHORRO DE ENERGÍA: Bajar brillo a los 2.5 min
listener {
    timeout = 150                                
    on-timeout = brightnessctl set 10%          
    on-resume = brightnessctl set 100%          
}

# 2. BLOQUEO: Activar hyprlock a los 5 min
listener {
    timeout = 300                               
    on-timeout = hyprlock                       
}

# 3. MONITOR: Apagar la pantalla a los 5.5 min
# (Solo si ya está bloqueada para ahorrar energía)
listener {
    timeout = 330                                
    on-timeout = hyprctl dispatch dpms off       
    on-resume = hyprctl dispatch dpms on         
}

# 4. SUSPENSIÓN: Suspender sistema a los 10 min
listener {
    timeout = 600                                
    on-timeout = systemctl suspend               
}


